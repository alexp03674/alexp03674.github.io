document.getElementById("random-link").addEventListener("click", function(e) {

<script>
const drawings = [
{
  title:"Action Hero",
  img: "images/actionhero.webp",
  link: "drawingactionhero.html",
},  
{
    title:"Cloudy",
    img: "images/cloudy.webp",
    link: "aloneagain.html"
  },
  {
    title:"Family",
    img: "images/family.webp",
    link: "aloneagain.html"
  },
  {
    title: "Sun Spear",
    img: "images/sunspear.webp",
    link: "Aloneagain.html"
  }
];
</script>
<script>
const gallery = document.getElementById("gallery");

drawings.forEach(p => {
  const card = document.createElement("div");
  card.className = "card paintingcard";

  card.innerHTML = `
    <a href="${p.link}">
      <img src="${p.img}" loading="lazy"
           class="card-img-top-painting card-img-top">
    </a>
    <div class="card-body">
      <h5 class="card-title cardtext">${p.title}</h5>
    </div>
  `;

  gallery.appendChild(card);
});
</script>
<script>
  const pages = [
    "aloneagain.html",

    const randomPage = pages[Math.floor(Math.random() * pages.length)];
